<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/brand/simbolo-movepark.svg" />
    <!-- viewport-fit=cover é o que faz `env(safe-area-inset-*)` valer no iOS. Sem ele
         o inset volta 0 e a barra inferior fica colada no indicador de home. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Tema (claro/grafite): aplica a classe antes do paint pra não piscar. -->
    <script>
      (function () {
        try {
          if (localStorage.getItem("mp-theme") === "dark") {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- O titulo da pagina e gerido pelo Helmet: defaultTitle em AppProviders como
         fallback e cada pagina define o seu. Nao declare um estatico aqui para nao
         duplicar a tag no head. -->
    <!--app-head-->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
