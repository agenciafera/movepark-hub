name: Lighthouse

# Mede Performance/SEO/A11y/Best-Practices da home e do /search a cada PR.
# Não-bloqueante (continue-on-error, asserções em "warn"), no mesmo espírito do job
# pricing-integration: o número fica visível no PR sem travar o merge por flutuação
# de rede (o /search puxa dados do Supabase vivo no runtime, como em produção).
on:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      # URL + anon key são públicos (a anon key já vai embutida no frontend). Mesma
      # convenção do job pricing-integration em ci.yml.
      VITE_SUPABASE_URL: https://mgaigbezdalbyuqiofcf.supabase.co
      VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1nYWlnYmV6ZGFsYnl1cWlvZmNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MTcxOTksImV4cCI6MjA5NTI5MzE5OX0.H7f344gtsOeMF3dyCQTpfBNvjPhQkKXVrhlIDmZ85LE
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          # Mesmo pino de bun do restante do CI (ver CLAUDE.md).
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: Servir o dist (SPA) em background
        run: |
          bunx serve -s dist -l 4173 &
          echo "SERVE_PID=$!" >> "$GITHUB_ENV"

      - name: Aguardar o servidor subir
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:4173 >/dev/null && echo "up" && exit 0
            sleep 2
          done
          echo "servidor não subiu"; exit 1

      - name: Rodar Lighthouse (home + /search)
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:4173/
            http://localhost:4173/search?destino=aeroporto-de-congonhas
          configPath: ./lighthouserc.json
          runs: 3
          temporaryPublicStorage: true
