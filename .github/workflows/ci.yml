name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Gate obrigatório: rápido, determinístico, sem rede.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test:unit

  # pgTAP contra o stack local (schema do baseline + seed). Sem segredos.
  db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase db start
      - run: supabase test db

  # Testes das Edge Functions (Deno) — lógica pura de validação + templates.
  edge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno test --no-check --allow-env --allow-net supabase/functions

  # Não-bloqueante: bate na função simulate_price do banco vivo (read-only).
  # URL + anon key são públicos (anon key já vai embutida no frontend / .env versionado).
  pricing-integration:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      VITE_SUPABASE_URL: https://mgaigbezdalbyuqiofcf.supabase.co
      VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1nYWlnYmV6ZGFsYnl1cWlvZmNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MTcxOTksImV4cCI6MjA5NTI5MzE5OX0.H7f344gtsOeMF3dyCQTpfBNvjPhQkKXVrhlIDmZ85LE
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run test:int
