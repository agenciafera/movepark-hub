# Dependabot — guard nativo do GitHub (grátis inclusive em repo privado), parte da E0.6.
# Compara as deps do projeto com o GitHub Advisory Database e abre PR de bump quando há
# correção. Os ALERTS (aba Security) dependem do toggle em Settings → Code security e
# funcionam pelo manifesto (package.json) independente do version-update.
# Ressalva (bun): o version-update do Dependabot ainda tem suporte limitado a `bun.lock`;
# o `bun audit` no CI (security-scan.yml) cobre esse buraco. Ver docs/ e CLAUDE.md.
version: 2
updates:
  # Dependências JS/TS — lê o package.json.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "security-scan"
    # Só agrupa os patch/minor pra não abrir uma enxurrada de PRs.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # As próprias GitHub Actions dos workflows (mantém as Actions atualizadas).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "github-actions"
