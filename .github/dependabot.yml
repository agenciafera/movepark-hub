# Dependabot — guard nativo do GitHub (grátis inclusive em repo privado), parte da E0.6.
#
# O VALOR real aqui são os ALERTAS de segurança (aba Security) + os *security updates*,
# ligados nos toggles do repo (Settings → Code security) e INDEPENDENTES deste arquivo —
# funcionam pelo manifesto (package.json) mesmo sem bloco `updates` abaixo.
#
# ⚠️ npm version-update REMOVIDO de propósito: o Dependabot tem suporte incompleto a
# `bun.lock` — ele atualiza o package.json mas gera um lockfile que o `bun install
# --frozen-lockfile` (CI/Cloudflare, bun 1.3.13) rejeita com "lockfile had changes, but
# lockfile is frozen". Ou seja, TODO PR de bump npm nasce com a CI vermelha e não mergeia.
# O `bun audit` no security-scan.yml já cobre o gap de version-update; os alerts/security
# updates continuam pelo toggle. Ver CLAUDE.md (frozen-lockfile) e docs/security/.
# Quando o suporte a bun no Dependabot amadurecer, reintroduzir o bloco `npm` aqui.
version: 2
updates:
  # As próprias GitHub Actions dos workflows (sem bun → o version-update funciona bem).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "github-actions"
    # Agrupa num PR só e ignora major (bumps major de action são deliberados/testados).
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
