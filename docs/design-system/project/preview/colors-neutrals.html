<!-- @dsCard group="Colors" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px 32px; }
  .row { display:grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  .swatch { display:flex; flex-direction:column; gap: 8px; }
  .chip { height: 76px; border-radius: 14px; box-shadow: inset 0 0 0 1px rgba(41,38,63,0.10); }
  .name { font-size: 13px; font-weight: 600; }
  .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--colors-muted); }
</style>
</head><body>
<div class="card">
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#FFFFFF"></div><div class="name">White</div><div class="hex">#FFFFFF</div></div>
    <div class="swatch"><div class="chip" style="background:#E0E0E0"></div><div class="name">Gray 200</div><div class="hex">#E0E0E0</div></div>
    <div class="swatch"><div class="chip" style="background:#E0E5F2"></div><div class="name">Steel 100</div><div class="hex">#E0E5F2</div></div>
    <div class="swatch"><div class="chip" style="background:#818FAF"></div><div class="name">Steel 500</div><div class="hex">#818FAF</div></div>
    <div class="swatch"><div class="chip" style="background:#424242"></div><div class="name">Gray 800</div><div class="hex">#424242</div></div>
  </div>
</div>
</body></html>
