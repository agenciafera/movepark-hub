<!-- @dsCard group="Type" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px 32px; display:flex; align-items:flex-end; justify-content: space-around; gap: 18px; }
  .col { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .glyph { color: var(--colors-ink); line-height: 1; }
  .w100 { font-weight: 100; }
  .w300 { font-weight: 300; }
  .w400 { font-weight: 400; }
  .w500 { font-weight: 500; }
  .w700 { font-weight: 700; }
  .w900 { font-weight: 900; }
  .lab { font-size: 11px; font-weight: 700; letter-spacing: 0.3px; text-transform: uppercase; color: var(--colors-muted); }
</style>
</head><body>
<div class="card">
  <div class="col"><div class="glyph w100" style="font-size:48px">Mp</div><div class="lab">Thin · 100</div></div>
  <div class="col"><div class="glyph w300" style="font-size:48px">Mp</div><div class="lab">Light · 300</div></div>
  <div class="col"><div class="glyph w400" style="font-size:48px">Mp</div><div class="lab">Regular · 400</div></div>
  <div class="col"><div class="glyph w500" style="font-size:48px">Mp</div><div class="lab">Medium · 500</div></div>
  <div class="col"><div class="glyph w700" style="font-size:48px">Mp</div><div class="lab">Bold · 700</div></div>
  <div class="col"><div class="glyph w900" style="font-size:48px">Mp</div><div class="lab">Black · 900</div></div>
</div>
</body></html>
