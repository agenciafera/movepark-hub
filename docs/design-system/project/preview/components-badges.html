<!-- @dsCard group="Components" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px 32px; display:flex; gap: 14px; align-items:center; flex-wrap:wrap; }
  .badge-fav { background:#fff; color:var(--colors-ink); font-size:11px; font-weight:700; padding:6px 12px; border-radius:9999px; box-shadow: var(--shadow-card); }
  .tag-new { background:#DA455E; color:#fff; font-size:8px; font-weight:900; letter-spacing:.4px; text-transform:uppercase; padding:3px 8px; border-radius:9999px; }
  .pill-cat { background:#fff; box-shadow: inset 0 0 0 1px var(--colors-hairline); padding:8px 14px; border-radius:9999px; font-size:14px; font-weight:500; color:var(--colors-ink); display:inline-flex; align-items:center; gap:6px; }
  .pill-cat.active { box-shadow: inset 0 0 0 1.5px var(--colors-ink); }
  .chip-status { display:inline-flex; align-items:center; gap:6px; background:#E4F2FF; color:#4041A3; font-size:12px; font-weight:600; padding:5px 10px; border-radius:9999px; }
  .chip-status .dot { width:7px; height:7px; border-radius:9999px; background:#4041A3; }
  .chip-error { display:inline-flex; align-items:center; gap:6px; background:#FDECEC; color:#C13515; font-size:12px; font-weight:600; padding:5px 10px; border-radius:9999px; }
  .chip-success { display:inline-flex; align-items:center; gap:6px; background:#E6F3EC; color:#1F7A4D; font-size:12px; font-weight:600; padding:5px 10px; border-radius:9999px; }
</style>
</head><body>
<div class="card">
  <span class="badge-fav">Guest favorite</span>
  <span class="tag-new">NEW</span>
  <span class="pill-cat">Cobertas</span>
  <span class="pill-cat active">Próximas</span>
  <span class="chip-status"><span class="dot"></span>Reserva ativa</span>
  <span class="chip-success">✓ Operador verificado</span>
  <span class="chip-error">Cancelada</span>
</div>
</body></html>
