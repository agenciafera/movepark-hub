<!-- @dsCard group="Spacing" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 36px 32px; display:grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items:center; background: #FAFAFB; }
  .box {
    height: 96px; background: #fff; border-radius: 14px;
    display:flex; align-items:center; justify-content:center;
    font-size: 13px; font-weight: 600; color: var(--colors-ink);
  }
  .flat { box-shadow: inset 0 0 0 1px var(--colors-hairline); }
  .floated { box-shadow:
      rgba(41, 38, 63, 0.04) 0 0 0 1px,
      rgba(41, 38, 63, 0.06) 0 2px 6px 0,
      rgba(41, 38, 63, 0.10) 0 4px 12px 0;
  }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--colors-muted); margin-top: 8px; text-align:center; }
</style>
</head><body>
<div class="card">
  <div><div class="box flat">Flat (95% of surfaces)</div><div class="lab">no shadow · 1px hairline</div></div>
  <div><div class="box floated">Card hover / dropdown</div><div class="lab">--shadow-card</div></div>
</div>
</body></html>
