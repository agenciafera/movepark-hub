    letter-spacing: var(--type-display-xl-track);
    color: var(--colors-ink);
  }
  .lede { margin: 0; max-width: 62ch; font-size: 15px; line-height: 1.6; color: var(--colors-body); }

  .kit-link {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 20px;
    border-radius: 8px;
    background: var(--colors-primary);
    color: var(--colors-on-primary);
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
  }
  .kit-link:hover { background: var(--colors-primary-active); }

  nav.groups { display: flex; flex-wrap: wrap; gap: 8px; margin: 32px 0 0; }
  nav.groups a {
    padding: 8px 16px;
    border-radius: 32px;
    background: var(--colors-canvas);
    box-shadow: inset 0 0 0 1px var(--colors-hairline);
    color: var(--colors-ink);
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
  }
  nav.groups a:hover { box-shadow: inset 0 0 0 1px var(--colors-border-strong); }

  section { margin-top: 56px; scroll-margin-top: 24px; }
  h2 {
    margin: 0 0 20px;
    font-size: var(--type-display-sm-size);
    font-weight: var(--type-display-sm-weight);
    line-height: var(--type-display-sm-lh);
    letter-spacing: var(--type-display-sm-track);
    color: var(--colors-ink);
  }

  figure { margin: 0 0 20px; }
  figcaption { margin-bottom: 8px; }
  .specimen {
    display: block;
    width: 100%;
    border: 0;
    border-radius: 14px;
    background: var(--colors-canvas);
    box-shadow: 0 2px 8px rgba(41, 38, 63, 0.08);
    overflow: hidden;
  }
</style>

<script>
  // Os specimens são same-origin: mede o conteúdo e ajusta a altura do iframe.
  // Zera a altura antes de medir; senão scrollHeight nunca encolhe abaixo do
  // tamanho atual do iframe e specimens curtos ficam com sobra embaixo.
  function fit(frame) {
    try {
      const doc = frame.contentDocument;
      if (!doc || !doc.body) return;
      frame.style.height = "0px";
      frame.style.height = doc.documentElement.scrollHeight + "px";
    } catch {
      frame.style.height = "220px";
    }
  }

  // Medir antes das fontes carregarem dá altura curta demais, então espera o
  // doc.fonts.ready de cada specimen.
  // Nada de ResizeObserver no documento de dentro: fit() mexe na altura do
  // iframe, o observer dispararia de novo e o laço trava o renderer.
  function track(frame) {
    const doc = frame.contentDocument;
    if (!doc) return;
    (doc.fonts ? doc.fonts.ready : Promise.resolve()).then(() => fit(frame));
  }

  for (const frame of document.querySelectorAll("iframe.specimen")) {
    frame.style.height = "160px";
    frame.addEventListener("load", () => track(frame));
    if (frame.contentDocument?.readyState === "complete") track(frame);
  }

  window.addEventListener("resize", () => {
    for (const frame of document.querySelectorAll("iframe.specimen")) fit(frame);
  });
</script>
