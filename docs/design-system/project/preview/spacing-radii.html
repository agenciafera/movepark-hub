<!-- @dsCard group="Spacing" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px 32px; display:flex; align-items:center; justify-content:space-around; gap: 16px; }
  .col { display:flex; flex-direction:column; align-items:center; gap: 8px; }
  .box { width: 72px; height: 72px; background: var(--mp-pale); box-shadow: inset 0 0 0 1px rgba(64,65,163,0.25); }
  .tok { font-size: 12px; font-weight: 600; color: var(--colors-ink); }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--colors-muted); }
  .r-xs   { border-radius: 4px; }
  .r-sm   { border-radius: 8px; }
  .r-md   { border-radius: 14px; }
  .r-lg   { border-radius: 20px; }
  .r-xl   { border-radius: 32px; }
  .r-full { border-radius: 9999px; }
</style>
</head><body>
<div class="card">
  <div class="col"><div class="box r-xs"></div><div class="tok">xs</div><div class="val">4px</div></div>
  <div class="col"><div class="box r-sm"></div><div class="tok">sm</div><div class="val">8px · button</div></div>
  <div class="col"><div class="box r-md"></div><div class="tok">md</div><div class="val">14px · card</div></div>
  <div class="col"><div class="box r-lg"></div><div class="tok">lg</div><div class="val">20px</div></div>
  <div class="col"><div class="box r-xl"></div><div class="tok">xl</div><div class="val">32px · strip</div></div>
  <div class="col"><div class="box r-full"></div><div class="tok">full</div><div class="val">pill</div></div>
</div>
</body></html>
