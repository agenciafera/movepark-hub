<!-- @dsCard group="Type" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 32px 36px; display:flex; flex-direction:column; gap: 22px; }
  .row { display:grid; grid-template-columns: 1fr 220px; gap: 24px; align-items: baseline; }
  .spec { font-family: var(--font-mono); font-size: 12px; color: var(--colors-muted); text-align: right; }
  .xl  { font-size: 52px; font-weight: 700; line-height: 1.1; letter-spacing: -0.6px; color: var(--colors-ink); }
  .lg  { font-size: 40px; font-weight: 500; line-height: 1.15; letter-spacing: -0.5px; color: var(--colors-ink); }
  .md  { font-size: 32px; font-weight: 700; line-height: 1.25; color: var(--colors-ink); }
  .sm  { font-size: 26px; font-weight: 600; line-height: 1.22; letter-spacing: -0.2px; color: var(--colors-ink); }
</style>
</head><body>
<div class="card">
  <div class="row"><div class="xl">Estacione com confiança</div><div class="spec">display-xl · 52 / 700</div></div>
  <div class="row"><div class="lg">Vagas perto de você, agora</div><div class="spec">display-lg · 40 / 500</div></div>
  <div class="row"><div class="md">O que esta vaga oferece</div><div class="spec">display-md · 32 / 700</div></div>
  <div class="row"><div class="sm">Coisas pra saber antes</div><div class="spec">display-sm · 26 / 600</div></div>
</div>
</body></html>
