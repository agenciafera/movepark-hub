<!-- @dsCard group="Components" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 0; }
  .nav { height: 80px; display:flex; align-items:center; justify-content: space-between; padding: 0 32px; border-bottom: 1px solid var(--colors-hairline); }
  .nav-logo img { height: 28px; display:block; }
  .tabs { display:flex; gap: 32px; }
  .tab { display:flex; flex-direction:column; align-items:center; gap: 4px; position:relative; padding: 8px 4px; cursor:pointer; }
  .tab .ico { font-size: 24px; }
  .tab .lab { font-size: 14px; font-weight: 600; color: var(--colors-muted); }
  .tab.active .lab { color: var(--colors-ink); }
  .tab.active::after { content:""; position:absolute; bottom: -4px; left: 8px; right: 8px; height: 2px; background: var(--colors-ink); border-radius: 2px; }
  .new-dot { position:absolute; top: 0; right: -10px; background:#DA455E; color:#fff; font-size:8px; font-weight:900; letter-spacing:0.4px; padding:2px 5px; border-radius:9999px; text-transform: uppercase; }
  .right { display:flex; gap: 18px; align-items:center; }
  .util { font-size: 14px; font-weight: 600; color: var(--colors-ink); }
  .avatar { width: 36px; height: 36px; border-radius: 9999px; background: var(--mp-navy); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:13px; }
</style>
</head><body>
<div class="card">
  <div class="nav">
    <div class="nav-logo"><img src="../assets/logo-movepark.svg"></div>
    <div class="tabs">
      <div class="tab active">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#29263F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="lab">Vagas</span>
      </div>
      <div class="tab">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6A6A6A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M6 6V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2"/></svg>
        <span class="lab">Mensal</span>
        <span class="new-dot">NEW</span>
      </div>
      <div class="tab">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6A6A6A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 0 20"/></svg>
        <span class="lab">Serviços</span>
        <span class="new-dot">NEW</span>
      </div>
    </div>
    <div class="right">
      <span class="util">Seja um operador</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#29263F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 0 20"/></svg>
      <div class="avatar">A</div>
    </div>
  </div>
</div>
</body></html>
