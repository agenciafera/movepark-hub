<!-- @dsCard group="Colors" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px 32px; }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .item { display:flex; align-items:center; gap: 12px; }
  .chip { width: 44px; height: 44px; border-radius: 999px; box-shadow: inset 0 0 0 1px rgba(41,38,63,0.10); flex-shrink:0; }
  .meta { display:flex; flex-direction:column; gap:2px; }
  .name { font-size: 13px; font-weight: 600; }
  .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--colors-muted); }
</style>
</head><body>
<div class="card">
  <div class="row">
    <div class="item"><div class="chip" style="background:#C13515"></div><div class="meta"><div class="name">Error</div><div class="hex">#C13515</div></div></div>
    <div class="item"><div class="chip" style="background:#B96A00"></div><div class="meta"><div class="name">Warning</div><div class="hex">#B96A00</div></div></div>
    <div class="item"><div class="chip" style="background:#1F7A4D"></div><div class="meta"><div class="name">Success</div><div class="hex">#1F7A4D</div></div></div>
    <div class="item"><div class="chip" style="background:#4041A3"></div><div class="meta"><div class="name">Info</div><div class="hex">#4041A3</div></div></div>
  </div>
</div>
</body></html>
