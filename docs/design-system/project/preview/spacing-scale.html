<!-- @dsCard group="Spacing" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px 32px; display:flex; align-items:flex-end; gap: 22px; }
  .col { display:flex; flex-direction:column; align-items:center; gap: 6px; }
  .bar { background: var(--mp-pale); border-radius: 4px; box-shadow: inset 0 0 0 1px rgba(64,65,163,0.15); width: 36px; }
  .tok { font-size: 11px; font-weight: 700; color: var(--colors-ink); }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--colors-muted); }
</style>
</head><body>
<div class="card">
  <div class="col"><div class="bar" style="height:2px"></div><div class="tok">xxs</div><div class="val">2</div></div>
  <div class="col"><div class="bar" style="height:4px"></div><div class="tok">xs</div><div class="val">4</div></div>
  <div class="col"><div class="bar" style="height:8px"></div><div class="tok">sm</div><div class="val">8</div></div>
  <div class="col"><div class="bar" style="height:12px"></div><div class="tok">md</div><div class="val">12</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="tok">base</div><div class="val">16</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="tok">lg</div><div class="val">24</div></div>
  <div class="col"><div class="bar" style="height:32px"></div><div class="tok">xl</div><div class="val">32</div></div>
  <div class="col"><div class="bar" style="height:48px"></div><div class="tok">xxl</div><div class="val">48</div></div>
  <div class="col"><div class="bar" style="height:64px"></div><div class="tok">section</div><div class="val">64</div></div>
</div>
</body></html>
