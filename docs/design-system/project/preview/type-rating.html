<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px 32px; display:grid; grid-template-columns: auto 1fr; gap: 32px; align-items:center; }
  .rating { font-size: 64px; font-weight: 900; line-height: 1.05; letter-spacing: -1.5px; color: var(--colors-ink); display:flex; align-items:center; gap: 8px; }
  .laurel { color: var(--colors-ink); font-size: 36px; opacity: 0.9; }
  .spec { font-family: var(--font-mono); font-size: 12px; color: var(--colors-muted); }
  .meta { display:flex; flex-direction:column; gap: 6px; }
  .lab { font-size: 11px; font-weight: 700; letter-spacing: 0.3px; text-transform: uppercase; color: var(--colors-muted); }
  .role { font-size: 13px; color: var(--colors-ink); }
</style>
</head><body>
<div class="card">
  <div class="rating">
    <svg width="14" height="40" viewBox="0 0 14 40" fill="none"><path d="M13 2 C 3 12, 3 28, 13 38" stroke="#29263F" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
    4.81
    <svg width="14" height="40" viewBox="0 0 14 40" fill="none"><path d="M1 2 C 11 12, 11 28, 1 38" stroke="#29263F" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
  </div>
  <div class="meta">
    <div class="lab">rating-display</div>
    <div class="spec">64px · 900 · -1.5px · 1.05</div>
    <div class="role">The single loud type moment in the system. Listing-detail rating only.</div>
  </div>
</div>
</body></html>
