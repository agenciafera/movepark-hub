<!-- @dsCard group="Colors" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px 32px; }
  .row { display:grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  .swatch { display:flex; flex-direction:column; gap: 8px; }
  .chip { height: 76px; border-radius: 14px; box-shadow: inset 0 0 0 1px rgba(41,38,63,0.06); }
  .name { font-size: 13px; font-weight: 600; color: var(--colors-ink); }
  .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--colors-muted); }
</style>
</head><body>
<div class="card">
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#29263F"></div><div class="name">Navy</div><div class="hex">#29263F</div></div>
    <div class="swatch"><div class="chip" style="background:#4041A3"></div><div class="name">Indigo</div><div class="hex">#4041A3</div></div>
    <div class="swatch"><div class="chip" style="background:#5D5FEF"></div><div class="name">Violet</div><div class="hex">#5D5FEF</div></div>
    <div class="swatch"><div class="chip" style="background:#E4F2FF"></div><div class="name">Pale</div><div class="hex">#E4F2FF</div></div>
    <div class="swatch"><div class="chip" style="background:#DA455E"></div><div class="name">Red</div><div class="hex">#DA455E</div></div>
  </div>
</div>
</body></html>
