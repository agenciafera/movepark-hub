<!-- @dsCard group="Type" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px 32px; display:flex; flex-direction:column; gap: 12px; }
  .row { display:grid; grid-template-columns: 1fr 220px; gap: 24px; align-items: baseline; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--colors-muted); text-align: right; }
  .title-md { font-size: 16px; font-weight: 600; line-height: 1.25; color: var(--colors-ink); }
  .title-sm { font-size: 16px; font-weight: 500; line-height: 1.25; color: var(--colors-ink); }
  .body-md  { font-size: 16px; font-weight: 400; line-height: 1.5; color: #424242; }
  .body-sm  { font-size: 14px; font-weight: 400; line-height: 1.43; color: #424242; }
  .caption  { font-size: 13px; color: #6A6A6A; }
</style>
</head><body>
<div class="card">
  <div class="row"><div class="title-md">Garagem coberta · Centro</div><div class="spec">title-md · 16 / 600</div></div>
  <div class="row"><div class="title-sm">Suporte</div><div class="spec">title-sm · 16 / 500</div></div>
  <div class="row"><div class="body-md">Estacionamento privado em garagem coberta, com acesso 24h e câmeras de segurança.</div><div class="spec">body-md · 16 / 400</div></div>
  <div class="row"><div class="body-sm">Hosted by Ana · 0.8 km · 24h disponível</div><div class="spec">body-sm · 14 / 400</div></div>
  <div class="row"><div class="caption">© 2026 Movepark, Inc.</div><div class="spec">caption-sm · 13 / 400</div></div>
</div>
</body></html>
