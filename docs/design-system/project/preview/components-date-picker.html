<!-- @dsCard group="Components" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px 32px; display:flex; align-items:center; justify-content:center; }
  .cal { width: 320px; background: #fff; }
  .head { display:flex; justify-content: space-between; align-items:center; margin-bottom: 12px; }
  .month { font-size: 15px; font-weight: 600; color: var(--colors-ink); }
  .nav-btn { width: 28px; height: 28px; border-radius: 9999px; box-shadow: inset 0 0 0 1px var(--colors-hairline); display:flex; align-items:center; justify-content:center; color: var(--colors-ink); cursor: pointer; background: #fff; }
  .grid { display:grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .dow { font-size: 11px; font-weight: 600; color: var(--colors-muted); text-align:center; padding: 6px 0; text-transform: uppercase; letter-spacing: 0.2px; }
  .day { width: 36px; height: 36px; display:flex; align-items:center; justify-content:center; font-size: 13px; color: var(--colors-ink); border-radius: 9999px; cursor: pointer; }
  .day.muted { color: var(--colors-muted-soft); }
  .day.selected { background: var(--mp-navy); color: #fff; }
  .day.range { background: #F2F2F4; border-radius: 0; }
  .day.range.start { border-top-left-radius: 9999px; border-bottom-left-radius: 9999px; }
  .day.range.end { border-top-right-radius: 9999px; border-bottom-right-radius: 9999px; }
</style>
</head><body>
<div class="card">
  <div class="cal">
    <div class="head">
      <div class="nav-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></div>
      <div class="month">Maio 2026</div>
      <div class="nav-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div>
    </div>
    <div class="grid">
      <div class="dow">D</div><div class="dow">S</div><div class="dow">T</div><div class="dow">Q</div><div class="dow">Q</div><div class="dow">S</div><div class="dow">S</div>
      <div class="day muted">26</div><div class="day muted">27</div><div class="day muted">28</div><div class="day muted">29</div><div class="day muted">30</div><div class="day">1</div><div class="day">2</div>
      <div class="day">3</div><div class="day">4</div><div class="day">5</div><div class="day">6</div><div class="day">7</div><div class="day">8</div><div class="day">9</div>
      <div class="day">10</div><div class="day">11</div><div class="day">12</div>
      <div class="day selected">13</div>
      <div class="day range">14</div><div class="day range">15</div>
      <div class="day selected">16</div>
      <div class="day">17</div><div class="day">18</div><div class="day">19</div><div class="day">20</div><div class="day">21</div><div class="day">22</div><div class="day">23</div>
      <div class="day">24</div><div class="day">25</div><div class="day">26</div><div class="day">27</div><div class="day">28</div><div class="day">29</div><div class="day">30</div>
    </div>
  </div>
</div>
</body></html>
