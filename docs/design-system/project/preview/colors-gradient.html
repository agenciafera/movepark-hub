<!-- @dsCard group="Colors" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px 32px; display:grid; grid-template-columns: 1.4fr 1fr; gap: 24px; align-items:center; }
  .grad { height: 120px; border-radius: 14px; background: linear-gradient(135deg, #4041A3 0%, #5D5FEF 60%, #4041A3 100%); }
  .meta { display:flex; flex-direction:column; gap:6px; }
  .label { font-size: 13px; font-weight: 600; color: var(--colors-ink); }
  .stops { font-family: var(--font-mono); font-size: 11px; color: var(--colors-muted); line-height: 1.6; }
  .use   { font-size: 12px; color: var(--colors-muted); }
</style>
</head><body>
<div class="card">
  <div class="grad"></div>
  <div class="meta">
    <div class="label">Brand gradient</div>
    <div class="stops">linear-gradient(135deg,<br>&nbsp;&nbsp;#4041A3 0%,<br>&nbsp;&nbsp;#5D5FEF 60%,<br>&nbsp;&nbsp;#4041A3 100%)</div>
    <div class="use">Editorial use only — never on CTAs.</div>
  </div>
</div>
</body></html>
